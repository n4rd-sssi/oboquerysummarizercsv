<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Encoded Applications Summary</title>

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      padding:16px;
      background:#e9edf2;
      font-family:"Segoe UI",sans-serif;
      color:#1e293b;
    }

    h1{
      margin:0 0 10px;
      font-size:28px;
      color:#0f172a;
      text-align:center;
    }

    .upload-box{
      background:white;
      padding:16px;
      border-radius:12px;
      box-shadow:0 2px 8px rgba(0,0,0,.06);
      margin-bottom:14px;
    }

    .upload-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:12px;
      margin-top:14px;
    }

    label{
      font-size:13px;
      font-weight:700;
      color:#0f172a;
      display:block;
      margin-bottom:6px;
    }

    input[type="file"],
    input[type="date"],
    select{
      width:100%;
      padding:10px;
      border:1px solid #cbd5e1;
      border-radius:10px;
      background:#f8fafc;
      font-size:13px;
      color:#1e293b;
    }

    .filter-box{
      margin-top:14px;
      margin-bottom:12px;
      background:white;
      border-radius:12px;
      padding:14px;
      box-shadow:0 2px 8px rgba(0,0,0,.05);
    }

    .filter-title{
      font-size:14px;
      font-weight:700;
      margin-bottom:10px;
      color:#0f172a;
    }

    .filter-actions{
      display:flex;
      gap:8px;
      margin-bottom:12px;
      flex-wrap:wrap;
    }

    .mini-btn{
      border:none;
      cursor:pointer;
      padding:6px 12px;
      border-radius:8px;
      font-size:12px;
      font-weight:700;
      color:white;
      background:#0f766e;
      transition:.2s;
    }

    .mini-btn:hover{
      opacity:.9;
    }

    .mini-btn.secondary{
      background:#64748b;
    }

    .checkbox-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
      gap:8px 14px;
    }

    .checkbox-item{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:13px;
      color:#334155;
    }

    .checkbox-item input{
      accent-color:#0f766e;
      cursor:pointer;
    }

    .controls{
      margin:14px 0 18px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .main-btn{
      border:none;
      cursor:pointer;
      padding:11px 18px;
      border-radius:10px;
      font-size:14px;
      font-weight:600;
      color:white;
      background:linear-gradient(135deg,#0f766e,#155e75);
      box-shadow:0 4px 10px rgba(15,118,110,.25);
      transition:.2s;
    }

    .main-btn:hover{
      transform:translateY(-1px);
    }

    .main-btn.secondary{
      background:linear-gradient(135deg,#475569,#334155);
      box-shadow:0 4px 10px rgba(51,65,85,.2);
    }

    .title-wrapper{
      width:100%;
      margin-bottom:18px;
    }

    #editableTitle{
      width:100%;
      padding:4px 2px;
      font-size:28px;
      font-weight:800;
      color:#0f172a;
      background:transparent;
      border:none;
      outline:none;
    }

    #editableTitle:hover{
      background:rgba(255,255,255,.35);
      border-radius:8px;
    }

    .output{
      column-width:500px;
      column-gap:14px;
      width:100%;
    }

    .card{
      width:100%;
      display:inline-block;
      vertical-align:top;
      margin:0 0 14px;
      background:white;
      border-radius:14px;
      overflow:hidden;
      break-inside:avoid;
      box-shadow:0 3px 10px rgba(0,0,0,.06);
      border:1px solid #dbe4ee;
    }

    .card-header{
      background:linear-gradient(135deg,#0f766e,#155e75);
      color:white;
      padding:10px 12px;
      text-align:center;
      font-size:15px;
      font-weight:700;
      line-height:1.3;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    thead th{
      background:#dce7f5;
      color:#1e293b;
      font-size:11px;
      text-transform:uppercase;
      padding:8px;
      border-bottom:1px solid #cbd5e1;
    }

    tbody td{
      padding:7px 10px;
      font-size:12px;
      border-bottom:1px solid #edf2f7;
    }

    tbody tr:nth-child(even){
      background:#f8fafc;
    }

    tbody td:last-child{
      text-align:right;
      font-weight:700;
      color:#0f172a;
      width:75px;
    }

    .totals{
      padding:10px 12px;
      background:#fafcff;
      border-top:1px solid #e2e8f0;
    }

    .totals-row{
      display:flex;
      justify-content:space-between;
      gap:12px;
      padding:3px 0;
      font-size:12px;
    }

    .totals-label{
      color:#64748b;
      font-weight:600;
    }

    .totals-value{
      font-weight:800;
      color:#0f172a;
    }

    .highlight{
      color:#0f766e;
    }

    .message{
      background:#fff7ed;
      border:1px solid #fed7aa;
      color:#9a3412;
      padding:10px 12px;
      border-radius:10px;
      margin-bottom:12px;
      font-size:13px;
      display:none;
    }

    .summary-line{
      background:white;
      border-radius:12px;
      padding:10px 12px;
      margin-bottom:14px;
      font-size:13px;
      color:#334155;
      box-shadow:0 2px 8px rgba(0,0,0,.04);
      display:none;
    }
    .drop-zone{
  border:2px dashed #94a3b8;
  border-radius:14px;
  padding:24px;
  text-align:center;
  background:#f8fafc;
  transition:.2s;
}

.drop-zone.dragover{
  border-color:#0f766e;
  background:#ecfdf5;
}

.drop-zone p{
  margin:6px 0;
  font-size:13px;
  color:#475569;
}

.file-name{
  margin-top:10px;
  font-size:12px;
  font-weight:700;
  color:#0f766e;
}

    @media (max-width:700px){
      .checkbox-grid{
        grid-template-columns:1fr;
      }

      #editableTitle{
        font-size:22px;
      }
    }
  </style>
</head>

<body>

  <h1>OBO Query Summarizer</h1>

<div class="upload-box">
  <label>Upload CSV File</label>

  <div id="dropZone" class="drop-zone">
    <p><strong>Drag and drop your CSV file here</strong></p>
    <p>or</p>

    <button type="button" class="main-btn" onclick="document.getElementById('csvFile').click()">
      Choose CSV File
    </button>

    <input type="file" id="csvFile" accept=".csv" hidden />

    <p id="fileName" class="file-name">No file selected</p>
  </div>

  <div class="upload-grid">
    <div>
      <label for="dateColumn">Date Column</label>
      <select id="dateColumn">
        <option value="submission_date">Submission Date</option>
        <option value="received_date">Received Date</option>
        <option value="or_dates">OR Date</option>
      </select>
    </div>

    <div>
      <label for="startDate">From</label>
      <input type="date" id="startDate">
    </div>

    <div>
      <label for="endDate">To</label>
      <input type="date" id="endDate">
    </div>
  </div>
</div>

  <div id="message" class="message"></div>
  <div id="summaryLine" class="summary-line"></div>

  <div class="filter-box">
    <div class="filter-title">
      Permit Types
    </div>

    <div class="filter-actions">
      <button type="button" class="mini-btn" onclick="selectAllFilters()">
        Select All
      </button>

      <button type="button" class="mini-btn secondary" onclick="clearAllFilters()">
        Clear All
      </button>
    </div>

    <div class="checkbox-grid" id="checkboxGrid"></div>
  </div>

  <div class="controls">
    <button class="main-btn" onclick="applyFiltersAndGenerate()">
      Generate Summary
    </button>

    <button class="main-btn secondary" onclick="resetDateFilters()">
      Clear Date Range
    </button>
  </div>

  <div class="title-wrapper">
    <div id="editableTitle" contenteditable="true">
      Summary of Encoded Applications
    </div>
  </div>

  <div class="output" id="output"></div>

  <script>
    let csvRows = [];
    let groupedData = [];

    const requiredColumns = [
      "control_no",
      "applicant",
      "permit_type_name",
      "status_name",
      "submission_date",
      "encoded_by",
      "encoder_email",
      "total_or_amount",
      "or_dates",
      "received_date"
    ];

    const csvFileInput = document.getElementById("csvFile");
const dropZone = document.getElementById("dropZone");
const fileName = document.getElementById("fileName");

csvFileInput.addEventListener("change", function(event){
  const file = event.target.files[0];

  if(file){
    fileName.textContent = file.name;
    handleCSVFile(file);
  }
});

dropZone.addEventListener("dragover", function(event){
  event.preventDefault();
  dropZone.classList.add("dragover");
});

dropZone.addEventListener("dragleave", function(){
  dropZone.classList.remove("dragover");
});

dropZone.addEventListener("drop", function(event){
  event.preventDefault();
  dropZone.classList.remove("dragover");

  const file = event.dataTransfer.files[0];

  if(!file){
    showMessage("Please drop a CSV file.");
    return;
  }

  if(!file.name.toLowerCase().endsWith(".csv")){
    showMessage("Please upload a valid CSV file.");
    return;
  }

  fileName.textContent = file.name;
  handleCSVFile(file);
});

    function updateEditableTitle(){
    const editableTitle = document.getElementById("editableTitle");

    const startDateValue = document.getElementById("startDate").value;
    const endDateValue = document.getElementById("endDate").value;

    if(startDateValue && endDateValue){
      editableTitle.textContent =
        `Summary of Encoded Applications as of ${formatDisplayDate(startDateValue)} to ${formatDisplayDate(endDateValue)}`;
    }
    else if(startDateValue && !endDateValue){
      editableTitle.textContent =
        `Summary of Encoded Applications as of ${formatDisplayDate(startDateValue)} onwards`;
    }
    else if(!startDateValue && endDateValue){
      editableTitle.textContent =
       `Summary of Encoded Applications as of records until ${formatDisplayDate(endDateValue)}`;
    }
    else{
      editableTitle.textContent =
        "Summary of Encoded Applications";
    }
  }

  function formatDisplayDate(dateValue){
  const date = new Date(dateValue);

  return date.toLocaleDateString("en-PH", {
    year: "numeric",
    month: "long",
    day: "numeric"
  });
}

    function showMessage(text){
      const message = document.getElementById("message");
      message.textContent = text;
      message.style.display = "block";
    }

    function hideMessage(){
      const message = document.getElementById("message");
      message.textContent = "";
      message.style.display = "none";
    }

    function showSummaryLine(text){
      const summaryLine = document.getElementById("summaryLine");
      summaryLine.textContent = text;
      summaryLine.style.display = "block";
    }

    function hideSummaryLine(){
      const summaryLine = document.getElementById("summaryLine");
      summaryLine.textContent = "";
      summaryLine.style.display = "none";
    }

function handleCSVFile(file){
  hideMessage();
  hideSummaryLine();

  if(!file){
    showMessage("Please upload a CSV file.");
    return;
  }

  if(!file.name.toLowerCase().endsWith(".csv")){
    showMessage("Please upload a valid CSV file.");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e){
    const csvText = e.target.result;

    csvRows = parseCSV(csvText);

    if(csvRows.length === 0){
      showMessage("The CSV file appears to be empty.");
      return;
    }

    const headers = Object.keys(csvRows[0]);

    const missingColumns = requiredColumns.filter(
      col => !headers.includes(col)
    );

    if(missingColumns.length > 0){
      showMessage(
        "Missing required columns: " + missingColumns.join(", ")
      );
      return;
    }

    applyFiltersAndGenerate();
  };

  reader.readAsText(file);
}

    function parseCSV(text){
      const rows = [];
      const lines = text.trim().split(/\r?\n/);

      if(lines.length < 2){
        return rows;
      }

      const headers = splitCSVLine(lines[0]).map(header =>
        header.trim()
      );

      for(let i = 1; i < lines.length; i++){
        const values = splitCSVLine(lines[i]);

        if(values.length === 0){
          continue;
        }

        const row = {};

        headers.forEach((header, index) => {
          row[header] = values[index] ? values[index].trim() : "";
        });

        rows.push(row);
      }

      return rows;
    }

    function splitCSVLine(line){
      const result = [];
      let current = "";
      let insideQuotes = false;

      for(let i = 0; i < line.length; i++){
        const char = line[i];
        const nextChar = line[i + 1];

        if(char === '"' && insideQuotes && nextChar === '"'){
          current += '"';
          i++;
        }
        else if(char === '"'){
          insideQuotes = !insideQuotes;
        }
        else if(char === "," && !insideQuotes){
          result.push(current);
          current = "";
        }
        else{
          current += char;
        }
      }

      result.push(current);

      return result;
    }

    function applyFiltersAndGenerate(){
      if(csvRows.length === 0){
        showMessage("Please upload a CSV file first.");
        return;
      }
      updateEditableTitle();
      buildGroupedData();
      renderCheckboxes(true);
      generateTables();
    }

    function buildGroupedData(){
      const permitMap = {};

      const dateColumn = document.getElementById("dateColumn").value;
      const startDateValue = document.getElementById("startDate").value;
      const endDateValue = document.getElementById("endDate").value;

      const startDate = startDateValue ? new Date(startDateValue) : null;
      const endDate = endDateValue ? new Date(endDateValue) : null;

      if(endDate){
        endDate.setHours(23, 59, 59, 999);
      }

      csvRows.forEach(row => {
        const rowDate = parseDate(row[dateColumn]);

        if(startDate && (!rowDate || rowDate < startDate)){
          return;
        }

        if(endDate && (!rowDate || rowDate > endDate)){
          return;
        }

        const permitType =
          row.permit_type_name && row.permit_type_name.trim()
            ? row.permit_type_name.trim()
            : "No Permit Type";

        const status =
          row.status_name && row.status_name.trim()
            ? row.status_name.trim()
            : "No Status";

        if(!permitMap[permitType]){
          permitMap[permitType] = {
            title: permitType,
            total: 0,
            statuses: {}
          };
        }

        permitMap[permitType].total++;

        if(!permitMap[permitType].statuses[status]){
          permitMap[permitType].statuses[status] = 0;
        }

        permitMap[permitType].statuses[status]++;
      });

      groupedData = Object.values(permitMap)
        .map(category => {
          return {
            title: category.title,
            total: category.total,
            statuses: Object.entries(category.statuses)
              .map(([status, count]) => {
                return {
                  status: status,
                  count: count
                };
              })
              .sort((a, b) => a.status.localeCompare(b.status))
          };
        })
        .sort((a, b) => a.title.localeCompare(b.title));

      updateSummaryLine();
    }

    function parseDate(value){
      if(!value){
        return null;
      }

      const cleaned = String(value).trim();

      if(!cleaned){
        return null;
      }

      /*
        If or_dates has multiple dates separated by commas,
        this uses the first date.
      */
      const firstDate = cleaned.split(",")[0].trim();

      /*
        Handles YYYY-MM-DD
        Example: 2026-05-15
      */
      if(/^\d{4}-\d{2}-\d{2}/.test(firstDate)){
        return new Date(firstDate);
      }

      /*
        Handles MM/DD/YYYY or M/D/YYYY
        Example: 05/15/2026
      */
      const slashMatch = firstDate.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);

      if(slashMatch){
        const month = Number(slashMatch[1]) - 1;
        const day = Number(slashMatch[2]);
        const year = Number(slashMatch[3]);

        return new Date(year, month, day);
      }

      /*
        Handles MM-DD-YYYY or M-D-YYYY
        Example: 05-15-2026
      */
      const dashMatch = firstDate.match(/^(\d{1,2})-(\d{1,2})-(\d{4})/);

      if(dashMatch){
        const month = Number(dashMatch[1]) - 1;
        const day = Number(dashMatch[2]);
        const year = Number(dashMatch[3]);

        return new Date(year, month, day);
      }

      const parsed = new Date(firstDate);

      if(isNaN(parsed.getTime())){
        return null;
      }

      return parsed;
    }

    function renderCheckboxes(resetChecked){
      const checkboxGrid = document.getElementById("checkboxGrid");

      const previouslyChecked = Array.from(
        document.querySelectorAll('#checkboxGrid input[type="checkbox"]:checked')
      ).map(cb => cb.value);

      checkboxGrid.innerHTML = "";

      groupedData.forEach(category => {
        const label = document.createElement("label");

        label.className = "checkbox-item";

        const shouldBeChecked =
          resetChecked || previouslyChecked.length === 0
            ? true
            : previouslyChecked.includes(category.title);

        label.innerHTML = `
          <input
            type="checkbox"
            value="${escapeHTML(category.title)}"
            ${shouldBeChecked ? "checked" : ""}
            onchange="generateTables()"
          >
          ${escapeHTML(category.title)}
        `;

        checkboxGrid.appendChild(label);
      });
    }

    function selectAllFilters(){
      document
        .querySelectorAll('#checkboxGrid input[type="checkbox"]')
        .forEach(cb => cb.checked = true);

      generateTables();
    }

    function clearAllFilters(){
      document
        .querySelectorAll('#checkboxGrid input[type="checkbox"]')
        .forEach(cb => cb.checked = false);

      generateTables();
    }

    function generateTables(){
      const output = document.getElementById("output");

      output.innerHTML = "";

      if(csvRows.length === 0){
        showMessage("Please upload a CSV file first.");
        return;
      }

      if(groupedData.length === 0){
        showMessage("No records found for the selected date range.");
        return;
      }

      hideMessage();

      const selectedHeaders = Array.from(
        document.querySelectorAll('#checkboxGrid input[type="checkbox"]:checked')
      ).map(cb => cb.value);

      groupedData
        .filter(category => selectedHeaders.includes(category.title))
        .forEach(category => {
          let completedCount = 0;
          let releasingCount = 0;

          category.statuses.forEach(item => {
            const normalizedStatus = item.status.toLowerCase();

            if(normalizedStatus === "completed"){
              completedCount += item.count;
            }

            if(normalizedStatus === "for releasing"){
              releasingCount += item.count;
            }
          });

          const transactionCount =
            completedCount + releasingCount;

          const remainingApplications =
            category.total - completedCount;

          let rows = "";

          category.statuses.forEach(item => {
            rows += `
              <tr>
                <td>${escapeHTML(item.status)}</td>
                <td>${item.count.toLocaleString()}</td>
              </tr>
            `;
          });

          const card = document.createElement("div");

          card.className = "card";

          card.innerHTML = `
            <div class="card-header">
              Encoded ${escapeHTML(category.title)} Applications
            </div>

            <table>
              <thead>
                <tr>
                  <th>Status</th>
                  <th>Count</th>
                </tr>
              </thead>

              <tbody>
                ${rows}
              </tbody>
            </table>

            <div class="totals">
              <div class="totals-row">
                <div class="totals-label">
                  Total Encoded Applications
                </div>

                <div class="totals-value">
                  ${category.total.toLocaleString()}
                </div>
              </div>

              <div class="totals-row">
                <div class="totals-label">
                  Total Remaining Applications
                </div>

                <div class="totals-value">
                  ${remainingApplications.toLocaleString()}
                </div>
              </div>

              <div class="totals-row">
                <div class="totals-label highlight">
                  Transaction Count
                </div>

                <div class="totals-value highlight">
                  ${transactionCount.toLocaleString()}
                </div>
              </div>
            </div>
          `;

          output.appendChild(card);
        });
    }

    function updateSummaryLine(){
      const dateColumn = document.getElementById("dateColumn").value;
      const startDateValue = document.getElementById("startDate").value;
      const endDateValue = document.getElementById("endDate").value;

      const totalFilteredRecords = groupedData.reduce(
        (sum, category) => sum + category.total,
        0
      );

      let text = `Showing ${totalFilteredRecords.toLocaleString()} record(s)`;

      if(startDateValue || endDateValue){
        text += ` filtered by ${dateColumn}`;

        if(startDateValue){
          text += ` from ${startDateValue}`;
        }

        if(endDateValue){
          text += ` to ${endDateValue}`;
        }
      }
      else{
        text += ` from all dates`;
      }

      showSummaryLine(text);
    }

    function resetDateFilters(){
      document.getElementById("startDate").value = "";
      document.getElementById("endDate").value = "";

      if(csvRows.length > 0){
        applyFiltersAndGenerate();
      }
      else{
        hideSummaryLine();
      }
    }

    function escapeHTML(value){
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>

</body>
</html>
